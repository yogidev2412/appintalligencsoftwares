name: ai_softwares
description: App Intelligence Softwares - Professional Software Company Website
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  
  # Animation
  animate_do: ^3.3.4
  visibility_detector: ^0.4.0+2
  
  # Icons & UI
  font_awesome_flutter: ^10.7.0
  google_fonts: ^6.2.1
  
  # Scroll
  scrollable_positioned_list: ^0.3.8
  
  # URL Launcher
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
  


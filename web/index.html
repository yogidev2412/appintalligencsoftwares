  <title>App Intelligence Softwares | Android • iOS • Web • AI • SaaS</title>
  
  <style>
    /* Loading screen styles */
    body {
      background-color: #0A0E1A;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }
    
    #loading {
      position: fixed;
      inset: 0;
      background: #0A0E1A;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .loader-logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #2563EB, #06B6D4);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      color: white;
      margin-bottom: 16px;
      box-shadow: 0 0 40px rgba(37, 99, 235, 0.4);
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    .loader-text {
      color: #E2E8F0;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .loader-sub {
      color: #64748B;
      font-size: 13px;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(37,99,235,0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(37,99,235,0.6); }
    }
  </style>
</head>
<body>
  <!-- HTML loading screen shown until Flutter initialises -->
  <div id="loading">
    <div class="loader-logo">AI</div>
    <div class="loader-text">App Intelligence Softwares</div>
    <div class="loader-sub">Initialising...</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      loading.classList.add('hidden');
      setTimeout(function() { loading.remove(); }, 500);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
